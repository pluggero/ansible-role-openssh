---
openssh_service_enabled: true

# Override specific openssh_server settings for molecule testing
openssh_server_molecule_overrides:
  banner: "/etc/ssh/test_banner.txt"
  print_motd: true

openssh_client_users:
  - user: testuser
    config:
      - host: "git.example.com"
        hostname: "git.example.com"
        identity_file: "~/.ssh/id_ed25519_git"
        identities_only: true
        user: "git"
        forward_agent: false
        port: 22
      - host: "prod-*"
        proxy_jump: "bastion.example.com"
        identity_file: "~/.ssh/id_ed25519_prod"
        identities_only: true
        strict_host_key_checking: true
        user_known_hosts_file: "~/.ssh/known_hosts_prod"
      - host: "dev-server"
        hostname: "dev.example.com"
        forward_agent: true
        strict_host_key_checking: false
