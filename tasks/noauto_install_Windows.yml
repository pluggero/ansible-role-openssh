---
- name: Ensure we are using Windows
  ansible.builtin.fail:
    msg: "This role only supports {{ ansible_os_family }} systems that use Windows."
  when: ansible_os_family != "Windows"

- name: Install OpenSSH via Windows Capability
  block:
    - name: Set openssh_config_dir fact
      ansible.builtin.set_fact:
        openssh_config_dir: "{{ openssh_config_dir_windows }}"

    - name: Install OpenSSH Client capability
      ansible.windows.win_shell: |
        $cap = Get-WindowsCapability -Online -Name OpenSSH.Client~~~~0.0.1.0
        if ($cap.State -ne 'Installed') {
          Add-WindowsCapability -Online -Name OpenSSH.Client~~~~0.0.1.0
          "installed"
        }
      when: "'OpenSSH.Client~~~~0.0.1.0' in openssh_distro_pkgs"
      become: true
      become_method: ansible.builtin.runas
      become_user: "{{ ansible_user }}"
      changed_when: "'installed' in openssh_client_install.stdout"
      register: openssh_client_install

    - name: Install OpenSSH Server capability
      ansible.windows.win_shell: |
        $cap = Get-WindowsCapability -Online -Name OpenSSH.Server~~~~0.0.1.0
        if ($cap.State -ne 'Installed') {
          Add-WindowsCapability -Online -Name OpenSSH.Server~~~~0.0.1.0
          "installed"
        }
      when: "'OpenSSH.Server~~~~0.0.1.0' in openssh_distro_pkgs"
      become: true
      become_method: ansible.builtin.runas
      become_user: "{{ ansible_user }}"
      changed_when: "'installed' in openssh_server_install.stdout"
      register: openssh_server_install

    - name: Ensure SSH configuration directory exists
      ansible.windows.win_file:
        path: "{{ openssh_config_dir }}"
        state: directory
      become: true
      become_method: ansible.builtin.runas
      become_user: "{{ ansible_user }}"
      when: openssh_server is defined
