---
- name: Check OpenSSH version from Windows Capability
  block:
    - name: Ensure we are using Windows
      ansible.builtin.fail:
        msg: "This role only supports {{ ansible_os_family }} systems that use Windows."
      when: ansible_os_family != "Windows"

    - name: Get OpenSSH Server capability info
      ansible.windows.win_shell: |
        $capability = Get-WindowsCapability -Online -Name OpenSSH.Server~~~~0.0.1.0
        if ($capability) {
          $capability.Version
        } else {
          ""
        }
      become: true
      become_method: ansible.builtin.runas
      become_user: "{{ ansible_user }}"
      changed_when: false
      failed_when: false
      ignore_errors: true
      register: openssh_pkg_mgr_version_cmd

    - name: Extract version into a variable
      ansible.builtin.set_fact:
        openssh_pkg_mgr_version: "{{ openssh_pkg_mgr_version_cmd.stdout | trim | regex_replace('^(\\d+\\.\\d+\\.\\d+).*', '\\1') }}"
      when: openssh_pkg_mgr_version_cmd.stdout | default('') | length > 0

    - name: Set empty version if capability not found
      ansible.builtin.set_fact:
        openssh_pkg_mgr_version: ""
      when: openssh_pkg_mgr_version_cmd.stdout | default('') | length == 0

    - name: Debug OpenSSH version from capability
      ansible.builtin.debug:
        var: openssh_pkg_mgr_version
