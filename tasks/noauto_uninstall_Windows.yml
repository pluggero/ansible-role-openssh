---
- name: Ensure we are using Windows
  ansible.builtin.fail:
    msg: "This role only supports {{ ansible_os_family }} systems that use Windows."
  when: ansible_os_family != "Windows"

- name: Uninstall OpenSSH on Windows
  block:
    - name: Stop sshd service if running
      ansible.windows.win_service:
        name: sshd
        state: stopped
      become: true
      become_method: ansible.builtin.runas
      become_user: "{{ ansible_user }}"
      register: openssh_stop_sshd
      failed_when:
        - openssh_stop_sshd.failed
        - "'was not found' not in (openssh_stop_sshd.msg | default(''))"

    - name: Remove OpenSSH Server capability
      ansible.windows.win_shell: |
        Remove-WindowsCapability -Online -Name OpenSSH.Server~~~~0.0.1.0
      when: "'OpenSSH.Server~~~~0.0.1.0' in openssh_distro_pkgs"
      become: true
      become_method: ansible.builtin.runas
      become_user: "{{ ansible_user }}"
      register: openssh_remove_server
      failed_when:
        - openssh_remove_server.failed
        - openssh_remove_server.rc != 0
        - "'not found' not in (openssh_remove_server.stderr | default('') | lower)"

    - name: Remove OpenSSH Client capability
      ansible.windows.win_shell: |
        Remove-WindowsCapability -Online -Name OpenSSH.Client~~~~0.0.1.0
      when: "'OpenSSH.Client~~~~0.0.1.0' in openssh_distro_pkgs"
      become: true
      become_method: ansible.builtin.runas
      become_user: "{{ ansible_user }}"
      register: openssh_remove_client
      failed_when:
        - openssh_remove_client.failed
        - openssh_remove_client.rc != 0
        - "'not found' not in (openssh_remove_client.stderr | default('') | lower)"
